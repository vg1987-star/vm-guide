name: Generera VM-matchguider

on:
  schedule:
    # Kör kl 08:00 svensk sommartid (06:00 UTC under CEST)
    - cron: "0 6 * * *"
  workflow_dispatch: # Tillåter manuell körning från GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checka ut repo
        uses: actions/checkout@v4

      - name: Sätt upp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installera beroenden
        run: pip install requests anthropic

      - name: Generera matchsidor
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: Commita och pusha genererade sidor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "Uppdatera matchguider $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
